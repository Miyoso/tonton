<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caisse Pizza de l'Ancien</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a0a00;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #d4380d;
      padding: 18px 24px;
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
      height: calc(100vh - 72px);
    }

    /* ===== MENU ===== */
    .menu {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #2a1000;
    }

    .category-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ff8c42;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 16px 0 8px;
      border-bottom: 2px solid #ff8c42;
      padding-bottom: 4px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }

    .product-btn {
      background: #3d1a00;
      border: 3px solid #6b3000;
      border-radius: 16px;
      padding: 14px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .product-btn:hover {
      background: #5a2800;
      border-color: #ff8c42;
      transform: scale(1.04);
    }

    .product-btn:active {
      transform: scale(0.97);
    }

    .product-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 10px;
    }

    .product-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .product-price {
      font-size: 1.4rem;
      font-weight: 900;
      color: #ffcc44;
    }

    .product-price::after {
      content: '$';
      font-size: 0.85rem;
      margin-left: 2px;
    }

    .product-recipe {
      width: 100%;
      border-top: 1px solid #5a3000;
      padding-top: 6px;
      margin-top: 2px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }

    .recipe-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 44px;
    }

    .recipe-item img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
    }

    .recipe-item span {
      font-size: 0.6rem;
      color: #bbb;
      text-align: center;
      line-height: 1.1;
      word-break: break-word;
    }

    /* ===== PANIER ===== */
    .cart {
      width: 320px;
      background: #111;
      display: flex;
      flex-direction: column;
      border-left: 3px solid #d4380d;
    }

    .cart-header {
      background: #1e1e1e;
      padding: 14px 16px;
      font-size: 1.2rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #333;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .cart-empty {
      text-align: center;
      color: #555;
      padding: 40px 16px;
      font-size: 1rem;
    }

    .cart-empty .empty-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .cart-item {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cart-item-img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #ddd;
    }

    .cart-item-subtotal {
      font-size: 1rem;
      font-weight: 900;
      color: #ffcc44;
    }

    .cart-item-subtotal::after {
      content: '$';
      font-size: 0.7rem;
      margin-left: 1px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .qty-btn:active { transform: scale(0.9); }

    .qty-btn.minus {
      background: #8b0000;
      color: #fff;
    }

    .qty-btn.plus {
      background: #1a7a1a;
      color: #fff;
    }

    .qty-num {
      font-size: 1.3rem;
      font-weight: 900;
      min-width: 26px;
      text-align: center;
    }

    /* ===== TOTAL & ACTIONS ===== */
    .cart-footer {
      border-top: 3px solid #333;
      padding: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .total-label {
      font-size: 1.3rem;
      font-weight: 700;
      color: #aaa;
    }

    .total-amount {
      font-size: 2.6rem;
      font-weight: 900;
      color: #ffcc44;
    }

    .total-amount::after {
      content: '$';
      font-size: 1.3rem;
      margin-left: 3px;
    }

    .btn-facture {
      width: 100%;
      padding: 16px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 8px;
    }

    .btn-facture:hover { background: #388e3c; }
    .btn-facture:active { transform: scale(0.98); }

    .btn-clear {
      width: 100%;
      padding: 12px;
      background: #7b1fa2;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-clear:hover { background: #9c27b0; }

    /* ===== MODAL FACTURE ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #fff;
      color: #111;
      border-radius: 20px;
      padding: 30px;
      width: 360px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .modal-logo {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 4px;
    }

    .modal-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #d4380d;
      margin-bottom: 2px;
    }

    .modal-date {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .modal-divider {
      border: none;
      border-top: 2px dashed #ccc;
      margin: 12px 0;
    }

    .modal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 1rem;
    }

    .modal-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-item-img { width: 36px; height: 36px; object-fit: contain; border-radius: 6px; }
    .modal-item-name { font-weight: 600; }
    .modal-item-qty { color: #888; font-size: 0.85rem; }
    .modal-item-price { font-weight: 700; color: #111; }

    .modal-total-row {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 1.5rem;
      font-weight: 900;
      color: #d4380d;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .modal-btn:hover { opacity: 0.85; }

    .modal-btn.print {
      background: #1565c0;
      color: #fff;
    }

    .modal-btn.close {
      background: #eee;
      color: #333;
    }

    @media (max-width: 700px) {
      .main { flex-direction: column; height: auto; }
      .cart { width: 100%; border-left: none; border-top: 3px solid #d4380d; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }
  </style>
</head>
<body>

<header>🍕 Pizza de l'Ancien — Caisse</header>

<div class="main">
  <!-- MENU -->
  <div class="menu" id="menu"></div>

  <!-- PANIER -->
  <div class="cart">
    <div class="cart-header">🛒 Commande</div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">
        <span class="empty-icon">🍽️</span>
        Rien encore…<br>Appuie sur un produit !
      </div>
    </div>
    <div class="cart-footer">
      <div class="total-row">
        <span class="total-label">TOTAL</span>
        <span class="total-amount" id="total">0</span>
      </div>
      <button class="btn-facture" onclick="showFacture()">🧾 Voir la facture</button>
      <button class="btn-clear" onclick="clearCart()">🗑️ Vider la commande</button>
    </div>
  </div>
</div>

<!-- MODAL FACTURE -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-logo">🍕</div>
    <div class="modal-title">Pizza de l'Ancien</div>
    <div class="modal-date" id="modal-date"></div>
    <hr class="modal-divider">
    <div id="modal-items"></div>
    <hr class="modal-divider">
    <div class="modal-total-row">
      <span>TOTAL</span>
      <span id="modal-total">0$</span>
    </div>
    <div class="modal-actions">
      <button class="modal-btn print" onclick="window.print()">🖨️ Imprimer</button>
      <button class="modal-btn close" onclick="document.getElementById('modal').classList.remove('show')">✖ Fermer</button>
    </div>
  </div>
</div>

<script>
const INGREDIENTS = {
  pateapizza:    { name: 'Pâte à pizza',   img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/pateapizza.webp' },
  saucetomate:   { name: 'Sauce tomate',   img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/saucetomate.webp' },
  jambonbayonne: { name: 'Jambon bayonne', img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/jambonbayonne.webp' },
  mozza:         { name: 'Mozza',          img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/mozza.webp' },
  fromage:       { name: 'Fromage',        img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/cheese.webp' },
  pate:          { name: 'Pâte',           img: 'https://i.goopics.net/evwyz7.png' },
  viandehachee:  { name: 'Viande hachée',  img: 'https://i.postimg.cc/3JPbhmnC/viande-hachee.png' },
  paindemie:     { name: 'Pain de mie',    img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/paindemie.webp' },
  olive:         { name: 'Olive',          img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/olive.webp' },
  huile:         { name: 'Huile',          img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/huile.webp' },
  mascarpone:    { name: 'Mascarpone',     img: 'https://i.postimg.cc/bNgtPJPv/image-removebg-preview.png' },
  chocolat:      { name: 'Chocolat',       img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/chocolat.webp' },
  farine:        { name: 'Farine',         img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/flour.webp' },
  oeuf:          { name: 'Oeuf',           img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/egg.webp' },
  sucre:         { name: 'Sucre',          img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/sugar.webp' },
  jusdecitron:   { name: 'Jus de citron',  img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/jusdecitron.webp' },
  eaugazeuse:    { name: 'Eau gazeuse',    img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/water2.webp' },
  alcool:        { name: 'Alcool',         img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/alcool.webp' },
  eau:           { name: 'Eau',            img: 'https://i.goopics.net/so718y.png' },
  siropcola:     { name: 'Sirop cola',     img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/siropcola.webp' },
  agave:         { name: 'Agave',          img: 'https://i.postimg.cc/W3HJWkkb/Gemini-Generated-Image-cr7oarcr7oarcr7o-removebg-preview.png' },
};

const PRODUCTS = [
  // Pizzas
  { id: 'lancien',    name: "Pizza de l'Ancien", img: 'https://i.postimg.cc/W4tprcvR/pzb33r.png',                                              price: 45, cat: 'Pizzas',   recipe: ['pateapizza','saucetomate','jambonbayonne'] },
  { id: 'margherita', name: 'Pizza Margherita',  img: 'https://i.postimg.cc/g0BJBkD2/d0hyhf.png',                                              price: 45, cat: 'Pizzas',   recipe: ['pateapizza','saucetomate','mozza'] },
  { id: '4fromage',   name: 'Pizza 4 Fromage',   img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/pizza4fromage.webp',                  price: 45, cat: 'Pizzas',   recipe: ['pateapizza','saucetomate','fromage'] },
  { id: 'burata',     name: 'Pizza Burata',       img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/pizzaburata.webp',                    price: 45, cat: 'Pizzas',   recipe: ['pateapizza','saucetomate','mozza'] },
  // Plats
  { id: 'lasagne',    name: 'Lasagne',            img: 'https://i.postimg.cc/4xfxfh2X/6qu43w.png',                                              price: 40, cat: 'Plats',    recipe: ['pate','viandehachee','saucetomate'] },
  { id: 'focaccia',   name: 'Focaccia',           img: 'https://cdn.visionrp.fr/inside/images-nourriture/PizzaThis/Foccacia.png',                price: 40, cat: 'Plats',    recipe: ['paindemie','olive','huile'] },
  // Desserts
  { id: 'tiramisu',   name: 'Tiramisu',           img: 'https://cdn.visionrp.fr/vision-cdn-v2/assets/items/tiramisu.webp',                       price: 20, cat: 'Desserts', recipe: ['mascarpone','chocolat'] },
  { id: 'panettone',  name: 'Panettone',          img: 'https://cdn.visionrp.fr/inside/images-nourriture/PizzaThis/panettone.png',                price: 20, cat: 'Desserts', recipe: ['farine','oeuf','sucre'] },
  // Boissons
  { id: 'limonata',   name: 'Limonata',           img: 'https://i.postimg.cc/YqgWGgxm/qk4lfw.png',                                              price: 30, cat: 'Boissons', recipe: ['jusdecitron','eaugazeuse','sucre'] },
  { id: 'limoncello', name: 'Limoncello',         img: 'https://cdn.visionrp.fr/inside/images-nourriture/PizzaThis/Limoncello.png',               price: 30, cat: 'Boissons', recipe: ['jusdecitron','alcool','eau'] },
  { id: 'tontoncola', name: 'Tonton Cola',        img: 'https://cdn.visionrp.fr/inside/images-nourriture/PizzaThis/TontonCola.png',               price: 30, cat: 'Boissons', recipe: ['siropcola','eaugazeuse','sucre'] },
  { id: 'tequila',    name: 'Tequila',            img: 'https://i.postimg.cc/V6fLgQyT/images-removebg-preview.png',                              price: 10, cat: 'Boissons', recipe: ['alcool','agave','eau'] },
];

const cart = {};

function getProductById(id) {
  return PRODUCTS.find(p => p.id === id);
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  renderCart();
  const btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.style.borderColor = '#ffcc44';
    btn.style.background = '#6b3500';
    setTimeout(() => {
      btn.style.borderColor = '';
      btn.style.background = '';
    }, 300);
  }
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const items = Object.entries(cart).filter(([,q]) => q > 0);

  if (items.length === 0) {
    container.innerHTML = `<div class="cart-empty"><span class="empty-icon">🍽️</span>Rien encore…<br>Appuie sur un produit !</div>`;
    document.getElementById('total').textContent = '0';
    return;
  }

  let total = 0;
  container.innerHTML = items.map(([id, qty]) => {
    const p = getProductById(id);
    const subtotal = p.price * qty;
    total += subtotal;
    return `
      <div class="cart-item">
        <img class="cart-item-img" src="${p.img}" alt="${p.name}">
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-subtotal">${subtotal}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn minus" onclick="changeQty('${id}', -1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn plus" onclick="changeQty('${id}', +1)">+</button>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('total').textContent = total;
}

function renderMenu() {
  const cats = [...new Set(PRODUCTS.map(p => p.cat))];
  const menu = document.getElementById('menu');
  menu.innerHTML = cats.map(cat => {
    const prods = PRODUCTS.filter(p => p.cat === cat);
    return `
      <div class="category-title">${cat}</div>
      <div class="products-grid">
        ${prods.map(p => `
          <button class="product-btn" id="btn-${p.id}" onclick="addToCart('${p.id}')">
            <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
            <span class="product-name">${p.name}</span>
            <span class="product-price">${p.price}</span>
            <div class="product-recipe">${p.recipe.map(k => {const ing = INGREDIENTS[k]; return `<div class="recipe-item"><img src="${ing.img}" alt="${ing.name}" loading="lazy"><span>${ing.name}</span></div>`;}).join('')}</div>
          </button>
        `).join('')}
      </div>
    `;
  }).join('');
}

function showFacture() {
  const items = Object.entries(cart).filter(([,q]) => q > 0);
  if (items.length === 0) {
    alert('La commande est vide !');
    return;
  }
  let total = 0;
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
    + ' — ' + now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

  const itemsHtml = items.map(([id, qty]) => {
    const p = getProductById(id);
    const subtotal = p.price * qty;
    total += subtotal;
    return `
      <div class="modal-item">
        <div class="modal-item-left">
          <img class="modal-item-img" src="${p.img}" alt="${p.name}">
          <div>
            <div class="modal-item-name">${p.name}</div>
            <div class="modal-item-qty">x${qty} × ${p.price}$</div>
          </div>
        </div>
        <span class="modal-item-price">${subtotal}$</span>
      </div>
    `;
  }).join('');

  document.getElementById('modal-date').textContent = dateStr;
  document.getElementById('modal-items').innerHTML = itemsHtml;
  document.getElementById('modal-total').textContent = total + '$';
  document.getElementById('modal').classList.add('show');
}

function closeModal(event) {
  if (event.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
}

function clearCart() {
  if (Object.keys(cart).length === 0) return;
  if (confirm('Vider toute la commande ?')) {
    Object.keys(cart).forEach(k => delete cart[k]);
    renderCart();
  }
}

renderMenu();
</script>
</body>
</html>
